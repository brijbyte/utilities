<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — utilities</title>
    <script>
      (function () {
        var t = localStorage.getItem("utilities-theme") || "system";
        var d =
          t === "dark" ||
          (t === "system" && matchMedia("(prefers-color-scheme:dark)").matches);
        if (d) document.documentElement.classList.add("dark");
      })();
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
      }

      :root {
        --bg: #f5f5f4;
        --surface: #ffffff;
        --text: #1c1917;
        --text-muted: #78716c;
        --border: #d6d3d1;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
      }

      .dark {
        --bg: #0c0a09;
        --surface: #1c1917;
        --text: #e7e5e4;
        --text-muted: #a8a29e;
        --border: #292524;
        --primary: #3b82f6;
        --primary-hover: #60a5fa;
      }

      html {
        font-family:
          ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", monospace;
        background: var(--bg);
        color: var(--text);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
      }

      .container {
        text-align: center;
        max-width: 28rem;
      }

      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.5rem;
        color: var(--text-muted);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      p {
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      a,
      button {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
        border: none;
      }

      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: var(--border);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="64"
        height="64"
        viewBox="0 0 512 512"
      >
        <rect width="512" height="512" rx="64" fill="#1c1917" />
        <text
          x="256"
          y="300"
          text-anchor="middle"
          font-family="monospace"
          font-weight="bold"
          font-size="240"
          fill="#e7e5e4"
        >
          U
        </text>
        <rect x="120" y="340" width="272" height="4" rx="2" fill="#78716c" />
      </svg>

      <h1>You're offline</h1>
      <p>
        This page isn't available offline yet. Connect to the internet and try
        again, or go back to a page you've already visited.
      </p>

      <div class="actions">
        <button class="btn-primary" onclick="location.reload()">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
            <path d="M16 16h5v5" />
          </svg>
          Retry
        </button>
        <a class="btn-secondary" href="/">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Home
        </a>
      </div>
    </div>
  </body>
</html>
